name: Build and attach release artifact

on:
  release:
    types: [published]

permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Build immich-importer
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            ext=".exe"
          else
            ext=""
          fi

          mkdir "immich-importer-${{ matrix.os }}-${{ matrix.arch }}"
          outdir="immich-importer-${{ matrix.os }}-${{ matrix.arch }}"
          outfile="$outdir/immich-importer${ext}"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o "$outdir" ./...
          echo "ASSET_PATH=$outfile" >> $GITHUB_ENV

      - name: Upload release artifact
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ env.ASSET_PATH }}
          asset_name: ${{ env.ASSET_PATH }}
          asset_content_type: application/octet-stream
