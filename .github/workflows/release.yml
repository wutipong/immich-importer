name: Build and attach release artifact

on:
  release:
    types: [published]

permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build immich-importer
        id: build
        run: |
          outdir="immich-importer-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir "$outdir"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o "$outdir" ./...
          zipfile="$outdir.zip"
          zip -r "$zipfile" "$outdir"
          echo "asset_path=$zipfile" >> $GITHUB_OUTPUT

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.asset_path }}
