name: Build and attach release artifact

on:
  release:
    types: [published]

permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Build immich-importer
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            ext=".exe"
          else
            ext=""
          fi

          outfile="immich-importer${ext}"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o "$outfile" .
          zipfile="immich-importer-${{ matrix.os }}-${{ matrix.arch }}.zip"
          zip "$zipfile" "$outfile"
          echo "ASSET_PATH=$zipfile" >> $GITHUB_ENV

      - name: Upload release artifact
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ASSET_PATH }}
